<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mascine – Cines Cercanos</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <link rel="stylesheet" href="css/style.css">

    <style>
        #map {
            height: 500px;
            border-radius: 10px;
        }

        .layout-cines {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .lista-cines {
            width: 30%;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #fafafa;
        }

        .cine-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }

        .cine-item:hover {
            background: #eee;
        }

        .buscador {
            margin-bottom: 10px;
        }

        .buscador input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<header>
    <h1>Mascine</h1>
    <nav>
        <a href="index.html">Cartelera</a>
        <a href="calendario.html">Calendario</a>
        <a href="cines.html">Cines</a>
        <a href="favoritos.html">Favoritos</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<main>
    <h2>Cines cercanos</h2>

    <div class="layout-cines">

        <!-- LISTA + BUSCADOR -->
        <aside class="lista-cines">
            <div class="buscador">
                <input type="text" id="input-buscar" placeholder="Buscar cine...">
            </div>

            <div id="lista-cines"></div>
        </aside>

        <!-- MAPA -->
        <div id="map"></div>

    </div>
</main>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Tu JS -->
<script src="js/cines.js"></script>

</body>
</html>
