<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mascine – Detalle de película</title>

    <!-- Tipografía Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Iconos Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Mascine</h1>
        <nav>
            <a href="index.html"><i class="fa-solid fa-film"></i> Cartelera</a>
            <a href="calendario.html"><i class="fa-solid fa-calendar-days"></i> Calendario</a>
            <a href="cines.html"><i class="fa-solid fa-location-dot"></i> Cines</a>
            <a href="favoritos.html"><i class="fa-solid fa-heart"></i> Favoritos</a>
            <a href="login.html"><i class="fa-solid fa-user"></i> Login</a>
        </nav>
    </header>

    <main>

        <!-- Título dinámico -->
        <h2 id="titulo-pelicula">Cargando...</h2>

        <!-- Botón volver -->
        <a href="index.html" class="btn-volver">
            <i class="fa-solid fa-arrow-left"></i> Volver a la cartelera
        </a>

        <!-- Contenedor principal -->
        <div id="detalle-pelicula" class="detalle-container">

            <!-- Poster -->
            <img id="poster" class="poster-detalle" alt="Poster de la película">

            <!-- Información -->
            <div class="info-detalle">

                <h3>Sinopsis</h3>
                <p id="sinopsis"></p>

                <p><strong>Género:</strong> <span id="genero"></span></p>

                <!-- Tráiler -->
                <div class="trailer-container">
                    <iframe id="trailer" frameborder="0" allowfullscreen></iframe>
                </div>

                <!-- Botón favoritos -->
                <button id="btn-favorito" class="btn-favorito">
                    <i class="fa-solid fa-heart"></i> Añadir a favoritos
                </button>

            </div>

        </div>
    </main>

    <script src="js/pelicula.js"></script>
    <footer class="footer">
    <p>Mascine © 2026 – Proyecto TFG</p>
    <p>Desarrollado por Francisco</p>
</footer>
    
</body>
</html>
